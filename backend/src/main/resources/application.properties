spring.application.name=backend

# Server port for local and deployed environments
server.port=${PORT:8080}

# PostgreSQL database connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:shelfcount_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:shelfcount_user}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD}}

# Development database behaviour
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Frontend URL allowed to call the backend
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}